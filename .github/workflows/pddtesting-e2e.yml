name: 🏥 E2E Test Suite and Report Generator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  run-tests:
    name: 🧪 Run E2E Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: Medicalcoding
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r testing/requirements_test.txt

      - name: 🟢 Start FastAPI Backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/Medicalcoding
          JWT_SECRET: your_super_secret_jwt_key_here
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: 1440
        run: |
          # Start uvicorn server in background
          nohup uvicorn backend.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          # Wait for server to start
          sleep 5
          curl -I http://127.0.0.1:8000/ || (cat backend.log && exit 1)

      - name: 🌐 Setup Chrome and Chromedriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: latest

      - name: 📦 Install Frontend Dependencies & Export Web
        run: |
          cd frontend
          npm install
          npx expo export --platform web

      - name: 🚀 Serve Frontend Web App
        run: |
          # Serve the compiled dist directory on port 8081
          nohup python3 scripts/spa_server.py 8081 frontend/dist > web_server.log 2>&1 &
          sleep 3
          curl -I http://localhost:8081/ || (cat web_server.log && exit 1)

      - name: 🧪 Run pytest Test Suite
        env:
          SELENIUM_BASE_URL: http://localhost:8081
          API_BASE_URL: http://127.0.0.1:8000
        run: |
          mkdir -p testing/reports
          python -m pytest testing/api testing/unit testing/functional testing/selenium_web --junitxml=testing/reports/master_junit.xml --tb=short -v || echo "Some tests failed"

      - name: 📱 Run Appium Mobile Simulated Tests
        run: |
          cd appium_node
          npm install
          node test_appium_mobile.js

      - name: 📊 Generate Excel Analysis Report
        run: |
          PYTHONPATH=. python testing/generate_test_report.py --junit testing/reports/master_junit.xml

      - name: 📤 Upload Excel Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalAutomation-Analysis-Report
          path: testing/reports/medicalautomation_analysis.xlsx
          retention-days: 30

      - name: 📝 Post Step Summary
        run: |
          cat testing/reports/step_summary.md >> $GITHUB_STEP_SUMMARY
